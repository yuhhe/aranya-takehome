---
# NOTE: this file is automatically generated from README.org
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clusterdos
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: argocd
  project: default
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
        # server-side apply by default
      - ServerSideApply=true
  source:
    repoURL: 'https://gitlab.com/aranya-tech/public/clusterdOS.git'
    path: metadeployment/
    targetRevision: v0.3.13
    helm:
      valuesObject:
        clusterdos:
          clustername: aranya-yuhan-he # REQUIRED
          ref: v0.3.13
        gitapps:
          certmanager:
            enabled: true
          crossplane:
            enabled: false
            # values:
            #   provider:
              # doc.crds.dev/github.com/crossplane-contrib/provider-upjet-digitalocean
              # https://github.com/crossplane-contrib/provider-upjet-digitalocean
              #   packages:
              #     - crossplane-contrib/provider-upjet-digitalocean:v0.2.1
          ksm:
            enabled: false
          lgtm:
            enabled: false
          metricsserver:
            enabled: true
          nfd:
            enabled: true
          nvidiagpuoperator:
            enabled: false
          rook:
            enabled: false
          wekafs:
            enabled: false
          tailscale:
            # https://tailscale.com/kb/1236/kubernetes-operator
            # requires a secret, see secrets dir for an example
            enabled: false
          traefik:
            enabled: false
          vllm:
            enabled: false
            values:
              model: "MiniMaxAI/MiniMax-M2"
              replicas: 1
              secret:
                # see secrets dir for example
                name: huggingface-token
              resources:
                requests:
                  nvidia.com/gpu: 1
